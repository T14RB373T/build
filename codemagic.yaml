workflows:
  ios-unsigned:
    name: iOS Unsigned Build (Stable)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      # 🔥 Clean
      - flutter clean
      - flutter pub get

      # 🔥 Regenerate iOS (biar fresh)
      - rm -rf ios
      - flutter create .

      # 🔥 Build pakai Xcode (tanpa signing)
      - cd ios
      - xcodebuild -workspace Runner.xcworkspace \
        -scheme Runner \
        -configuration Release \
        -sdk iphonesimulator \
        -derivedDataPath build \
        CODE_SIGNING_ALLOWED=NO

      # 🔥 kembali ke root
      - cd ..

      # 🔥 convert ke IPA
      - mkdir Payload
      - cp -r ios/build/Build/Products/Release-iphonesimulator/Runner.app Payload/
      - zip -r app.ipa Payload

    artifacts:
      - app.ipa
