workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign

      - mkdir Payload
      - cp -r build/ios/iphoneos/Runner.app Payload/
      - zip -r app.ipa Payload

    artifacts:
      - app.ipa
