workflows:
  ios-unsigned:
    name: iOS Unsigned Clean Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter clean
      - flutter pub get

      # 🔥 RESET iOS TOTAL
      - rm -rf ios
      - flutter create .

      # 🔥 BUILD TANPA SIGNING
      - flutter build ios --release --no-codesign

      # 🔥 BUNGKUS IPA
      - mkdir Payload
      - cp -r build/ios/iphoneos/Runner.app Payload/
      - zip -r app.ipa Payload

    artifacts:
      - app.ipa
