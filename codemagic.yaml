workflows:
  ios-unsigned:
    name: iOS Unsigned Simulator Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      # 🔥 cek environment
      - flutter doctor

      # 🔥 clean project
      - flutter clean

      # 🔥 install dependencies
      - flutter pub get

      # 🔥 regenerate project (biar iOS fresh & tidak corrupt)
      - rm -rf ios
      - flutter create .

      # 🔥 build TANPA signing (pakai simulator)
      - flutter build ios --release --no-codesign --simulator

      # 🔥 buat IPA manual (simulator build)
      - mkdir Payload
      - cp -r build/ios/iphonesimulator/Runner.app Payload/
      - zip -r app.ipa Payload

    artifacts:
      - app.ipa
